---
deployment:
  tasks:
    - export DEPLOYPATH=/home/kebunbar/muammar.kebunbaru.id

    # ensure deploy folder exists
    - /bin/mkdir -p $DEPLOYPATH

    # clean deploy folder completely
    - /usr/bin/find $DEPLOYPATH -mindepth 1 -maxdepth 1 -exec /bin/rm -rf {} +

    # copy repository contents exactly, including dotfiles like .htaccess
    # exclude git metadata and cpanel deploy file
    - /bin/tar --exclude='.git' --exclude='.cpanel.yml' -cf - . | /bin/tar -xf - -C $DEPLOYPATH

    - echo "CI3 muammar full mirror deploy SUCCESS"